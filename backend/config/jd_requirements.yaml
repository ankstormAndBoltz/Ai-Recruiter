# -----------------------------------------------------------------------------
# IDEAL PROFILE NARRATIVE
# Used for embedding-similarity scoring against candidate narratives.
# This is a paragraph version of the JD's "how to read between the lines."
# -----------------------------------------------------------------------------
ideal_profile_narrative: >
  A machine learning engineer with 6-8 years of total experience, of which
  4-5 are in applied ML/AI roles at product companies, not pure services or
  consulting. Has shipped at least one end-to-end ranking, search, or
  recommendation system to real users at meaningful scale. Has strong opinions
  about retrieval (hybrid vs dense), evaluation (offline vs online), and LLM
  integration (when to fine-tune vs prompt) — and can defend them with
  reference to systems they actually built. Comfortable with embeddings,
  vector databases, hybrid search, and modern NLP. Experienced with ranking
  evaluation frameworks like NDCG, MRR, MAP, and A/B testing. Tilts toward
  shipping over researching. Located in or willing to relocate to Noida or
  Pune, India. Active on the Redrob platform with strong engagement signals.
  Has worked at product-focused companies like startups or mid-stage tech
  companies, not just large consulting firms.

# -----------------------------------------------------------------------------
# LOGISTICS
# Location, notice period, and visa/relocation constraints.
# -----------------------------------------------------------------------------
logistics:
  preferred_locations:
    - Noida
    - Pune
  acceptable_locations:
    - Hyderabad
    - Mumbai
    - Delhi NCR
    - Gurgaon
    - Bangalore
    - Bengaluru
    - Delhi
    - New Delhi
  preferred_countries:
    - India
  visa_sponsorship: false
  notice_period:
    ideal_max_days: 30       # Sub-30 day notice is ideal
    buyout_max_days: 30      # Company can buy out up to 30 days
    acceptable_max_days: 90  # 30+ still in scope but higher bar
    hard_max_days: 180       # Schema max
  preferred_work_modes:
    - hybrid
    - flexible
    - onsite
  experience_range:
    min_years: 4
    ideal_min_years: 5
    ideal_max_years: 9
    max_years: 15  # Outside band but considered if signals strong
